name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  # ─── Next.js lint + type-check + build ──────────────────────────────────────
  web:
    name: Web (Next.js)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm --filter web type-check

      - name: Lint
        run: pnpm --filter web lint

      - name: Build
        run: pnpm --filter web build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_SOCKET_URL: http://localhost:4000
          NEXT_PUBLIC_AI_API_URL: http://localhost:8000
          NEXT_PUBLIC_APP_URL: http://localhost:3000
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
          TRADE_MODE: paper
          # Dummy URL so Next.js doesn't fail on missing env at build time
          AI_API_URL: http://localhost:8000

  # ─── Socket.IO server type-check ────────────────────────────────────────────
  socket-server:
    name: Socket Server
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm --filter socket-server exec tsc --noEmit

  # ─── FastAPI lint + import check ────────────────────────────────────────────
  ai-backend:
    name: AI Backend (FastAPI)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: apps/ai-backend/requirements.txt

      - name: Install dependencies (no TA-Lib / torch for CI speed)
        working-directory: apps/ai-backend
        run: |
          pip install fastapi pydantic pydantic-settings uvicorn httpx python-dotenv redis loguru

      - name: Check imports
        working-directory: apps/ai-backend
        run: python -c "from app.main import app; print('✅ FastAPI app imports OK')"
        env:
          REDIS_URL: redis://localhost:6379
