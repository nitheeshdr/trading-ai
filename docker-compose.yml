services:
  redis:
    image: redis:7-alpine
    container_name: tradeview-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped

  # Uncomment to run Supabase locally (alternative to supabase CLI)
